<script>
function login(){
fetch("https://vivid-urja-saas.onrender.com/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:user.value,
password:pass.value
})
})
.then(res=>res.json())
.then(data=>{
if(!data.token){
alert("Login Failed");
return;
}

localStorage.setItem("token",data.token);
localStorage.setItem("role",data.role);

if(data.role==="admin"){
location="dashboard.html";
}else{
location="dealer-dashboard.html";
}
});
}
</script>

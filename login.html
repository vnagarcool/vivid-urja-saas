<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="email"><br>
<input id="pass"><br>

<button onclick="login()">Login</button>

<script>
const API="https://vivid-urja-saas.onrender.com";

function login(){
fetch(API+"/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:pass.value
})
})
.then(res=>res.json())
.then(d=>{
localStorage.setItem("token",d.token);

if(d.role==="admin") location.href="dashboard.html";
else location.href="leads.html";
});
}
</script>

</body>
</html>

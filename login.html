<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</div>

<script>
function login() {
  fetch("https://vivid-urja-saas.onrender.com/api/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.token){
      localStorage.setItem("token", data.token);

      if(data.role === "admin"){
        window.location = "dashboard.html";
      } else {
        window.location = "dealer-dashboard.html";
      }
    } else {
      alert("Invalid Login ❌");
    }
  });
}
</script>

</body>
</html>

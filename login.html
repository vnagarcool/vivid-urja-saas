<!DOCTYPE html>
<html>
<body>

<input id="user"><input id="pass">
<button onclick="login()">Login</button>

<script>
async function login(){
let res=await fetch("https://vivid-urja-saas.onrender.com/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
});

if(res.ok){
localStorage.setItem("token","secure123");
location="dashboard.html";
}
}
</script>

</body>
</html>

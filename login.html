<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIVID URJA Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 40px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #218838;
}

.error {
  color: red;
  margin-top: 10px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
}
</style>

</head>

<body>

<div class="box">

  <div class="logo">⚡ VIVID URJA</div>
  <h2>Admin Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="error" class="error"></div>

</div>

<script>
async function login(){
  let res = await fetch("https://vivid-urja-saas.onrender.com/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });

  if(res.ok){
    let data = await res.json();

    localStorage.setItem("token",data.token);
    localStorage.setItem("user",data.user);

    window.location.href="dashboard.html";
  } else {
    document.getElementById("error").innerText="Invalid Login ❌";
  }
}
</script>

</body>
</html>

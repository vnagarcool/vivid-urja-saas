<!DOCTYPE html>
<html>
<body>

<script>
if(!localStorage.getItem("token")) location="login.html";
</script>

<h2>CRM Dashboard</h2>

<table border="1">
<tbody id="data"></tbody>
</table>

<script>
async function load(){
let res=await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
headers:{Authorization:"secure123"}
});

let d=await res.json();

let html="";
d.forEach(l=>{
html+=`<tr>
<td>${l.name}</td>
<td>${l.phone}</td>
<td><button onclick="del('${l._id}')">Delete</button></td>
</tr>`;
});

document.getElementById("data").innerHTML=html;
}

async function del(id){
await fetch("https://YOUR_BACKEND_URL/api/leads/"+id,{
method:"DELETE"
});
load();
}

load();
</script>

</body>
</html>

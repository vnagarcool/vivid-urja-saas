<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVID URJA</title>

<style>
body{margin:0;font-family:Arial;background:#0f2027;color:white;}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1509395176047-4a66953fd231') center/cover;
}

.form-box{
background:rgba(255,255,255,0.1);
padding:20px;
margin:-50px auto;
max-width:400px;
border-radius:10px;
}

input,button{width:100%;padding:10px;margin:10px 0;}

.chat-btn{
position:fixed;bottom:20px;left:20px;
background:green;padding:15px;border-radius:50%;
}
</style>
</head>

<body>

<div class="hero">
<h1>₹0 बिजली बिल ⚡</h1>
<p>Solar लगवाओ</p>
</div>

<div class="form-box">
<form id="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<button>Submit</button>
</form>
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatBox" style="display:none;position:fixed;bottom:80px;left:20px;background:white;color:black;padding:10px;width:250px;">
<div id="messages"></div>
<input id="msg"><button onclick="send()">Send</button>
</div>

<script>

// FORM
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

let data={name:name.value,phone:phone.value,city:city.value};

await fetch("https://YOUR_BACKEND_URL/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

window.open(https://wa.me/91${data.phone});
alert("Lead Saved 🚀");
});

// CHAT UI
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display= box.style.display==="none"?"block":"none";
}

// AI CHAT
async function send(){
let input=document.getElementById("msg").value;
let messages=document.getElementById("messages");

messages.innerHTML+="<p>"+input+"</p>";

let res=await fetch("https://YOUR_BACKEND_URL/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:input})
});

let data=await res.json();
messages.innerHTML+="<p>"+data.reply+"</p>";
}

</script>

</body>
</html>

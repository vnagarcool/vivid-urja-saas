<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVID URJA | Ultra Solar UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  background:#0a0f1c;
  color:white;
  overflow-x:hidden;
}

/* 🌌 BACKGROUND ANIMATION */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 20%,#00c6ff33,transparent),
             radial-gradient(circle at 80% 80%,#00ffcc33,transparent);
  animation:move 8s infinite alternate;
  z-index:-1;
}

@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(-50px,-50px)}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(12px);
}

nav h2{
  background:linear-gradient(90deg,#00c6ff,#00ffcc);
  -webkit-background-clip:text;
  color:transparent;
}

nav button{
  padding:10px 15px;
  background:linear-gradient(90deg,#00c6ff,#00ffcc);
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:50px;
  background:linear-gradient(90deg,#00c6ff,#00ffcc);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  opacity:0.7;
  margin:10px 0 20px;
}

/* GLASS CARD */
.card{
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 0 20px #00c6ff33;
  width:320px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button.submit{
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,#00c6ff,#00ffcc);
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  padding:50px 20px;
}

.feature{
  margin:15px;
  padding:20px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  width:250px;
  transition:0.3s;
}

.feature:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #00c6ff55;
}

/* FLOATING CTA */
.cta{
  text-align:center;
  padding:40px;
}

.cta button{
  padding:15px 30px;
  background:linear-gradient(90deg,#00c6ff,#00ffcc);
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>

<nav>
  <h2>⚡ VIVID URJA</h2>
  <button onclick="location.href='login.html'">Login</button>
</nav>

<div class="hero">
  <div>
    <h1>₹0 Electricity Bill</h1>
    <p>Switch to Solar & Save ₹50,000/year</p>

    <div class="card">
      <h3>Free Solar Consultation</h3>

      <input id="name" placeholder="Name">
      <input id="phone" placeholder="Phone">
      <input id="city" placeholder="City">

      <button class="submit" onclick="submitLead()">Get Quote 🚀</button>
    </div>
  </div>
</div>

<div class="features">
  <div class="feature">⚡ 25+ Years Power</div>
  <div class="feature">💰 Govt Subsidy</div>
  <div class="feature">🏡 Free Installation</div>
</div>

<div class="cta">
  <h2>Start Saving Today 🌞</h2>
  <button onclick="submitLead()">Get Free Quote</button>
</div>

<div class="whatsapp" onclick="wa()">💬</div>

<script>

const API="https://vivid-urja-saas.onrender.com";

function submitLead(){
fetch(API+"/api/leads",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({
name:name.value,
phone:phone.value,
city:city.value
})
})
.then(res=>res.json())
.then(()=>alert("Lead Submitted 🚀"));
}

function wa(){
window.open("https://wa.me/919828712999");
}

</script>

</body>
</html>

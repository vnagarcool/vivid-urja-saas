<!DOCTYPE html>
<html>
<head>
<title>VIVID URJA</title>
</head>
<body>

<h2>Solar Lead Form</h2>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="city" placeholder="City"><br><br>

<button onclick="send()">Submit</button>

<script>
const API="https://vivid-urja-saas.onrender.com";

function send(){
fetch(API+"/api/leads",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name.value,
phone:phone.value,
city:city.value
})
})
.then(()=>alert("Lead Sent 🚀"));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVID URJA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{margin:0;background:#0f2027;color:white;font-family:Arial;}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
.btn{background:#28a745;padding:10px 20px;border:none;}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hero">
<h1>₹0 बिजली बिल ⚡</h1>
<button class="btn">Get Solar</button>
</div>

<form id="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button>Submit</button>
</form>

<script>
// 3D
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg")});
renderer.setSize(innerWidth,innerHeight);

const geo = new THREE.BoxGeometry(3,2,0.2);
const mat = new THREE.MeshBasicMaterial({color:0x00ffcc,wireframe:true});
const cube = new THREE.Mesh(geo,mat);
scene.add(cube);

camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
cube.rotation.x+=0.01;
cube.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

// API
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
phone:phone.value
})
});

alert("Lead Saved");
});
</script>

</body>
</html>

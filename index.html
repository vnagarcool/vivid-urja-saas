<!DOCTYPE html>
<html>
<head>
<title>VIVID URJA Solar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}

.hero {
background:linear-gradient(135deg,#0f2027,#2c5364);
color:white;text-align:center;padding:50px 20px;
}

.form-box {
background:white;margin:-30px auto;padding:20px;
max-width:400px;border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input {width:100%;padding:10px;margin:10px 0;}
button {width:100%;padding:10px;background:green;color:white;border:none;}

.features {padding:30px;text-align:center;}
.card {display:inline-block;width:250px;background:white;margin:10px;padding:20px;border-radius:10px;}

.footer {background:#0f2027;color:white;text-align:center;padding:20px;}
</style>

</head>

<body>

<div class="hero">
<h1>₹0 बिजली बिल ⚡</h1>
<p>Solar लगवाओ – Free बिजली</p>
<img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231" width="100%">
</div>

<div class="form-box">
<h3>Free Consultation</h3>

<form id="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<button>Submit</button>
</form>
</div>

<div class="form-box">
<h3>Subsidy Calculator</h3>
<input id="kw" placeholder="KW">
<button onclick="calc()">Calculate</button>
<h4 id="result"></h4>
</div>

<div class="features">
<div class="card">₹0 Bill</div>
<div class="card">₹95K Subsidy</div>
<div class="card">10 Year Warranty</div>
</div>

<div class="footer">Call: 8302095337</div>

<!-- CALL -->
<a href="tel:+918302095337" style="position:fixed;bottom:80px;right:20px;background:#007bff;color:white;padding:12px;border-radius:50%;">📞</a>

<!-- WA -->
<a href="https://wa.me/918955551902" style="position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:12px;border-radius:50%;">📲</a>

<script>
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

let data={name:name.value,phone:phone.value,city:city.value};

await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

window.open(https://wa.me/91${data.phone}?text=Hello ${data.name}, Solar enquiry);

alert("Lead Saved 🚀");
});

function calc(){
let kw=document.getElementById("kw").value;
let subsidy=kw*30000;
let cost=kw*60000;
document.getElementById("result").innerText=Final: ₹${cost-subsidy};
}
</script>

</body>
</html>

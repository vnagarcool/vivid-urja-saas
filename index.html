<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIVID URJA Solar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f2027;color:white;}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1509395176047-4a66953fd231') center/cover;
}

.form-box{
background:rgba(255,255,255,0.1);
padding:20px;
margin:-50px auto;
max-width:400px;
border-radius:10px;
}

input,button{
width:100%;
padding:10px;
margin:10px 0;
}

</style>
</head>

<body>

<div class="hero">
<h1>₹0 बिजली बिल ⚡</h1>
<p>Solar लगवाओ</p>
</div>

<div class="form-box">
<form id="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<button>Submit</button>
</form>
</div>

<!-- CHAT -->
<div onclick="toggleChat()" style="position:fixed;bottom:20px;left:20px;background:green;padding:15px;border-radius:50%;">
💬
</div>

<div id="chatBox" style="display:none;position:fixed;bottom:80px;left:20px;background:white;color:black;padding:10px;width:250px;">
<div id="messages"></div>
<input id="msg"><button onclick="send()">Send</button>
</div>

<script>

// FORM
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

let data={name:name.value,phone:phone.value,city:city.value};

await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Saved");
});

// CHAT
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display= box.style.display==="none"?"block":"none";
}

function send(){
let input=document.getElementById("msg").value;
let messages=document.getElementById("messages");

messages.innerHTML+="<p>"+input+"</p>";

let reply=getReply(input);

messages.innerHTML+="<p>"+reply+"</p>";
}

// 🔥 FINAL AI FUNCTION (REPLACED)
function getReply(msg){

msg=msg.toLowerCase();

if(/\d{10}/.test(msg)){
fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:"Chat User",
phone:msg,
city:"Unknown"
})
});

window.open(https://wa.me/91${msg});

return "Thanks! हम आपको contact करेंगे ✅";
}

if(msg.includes("price")){
return "₹80,000 से start होता है";
}

if(msg.includes("subsidy")){
return "₹95,000 subsidy available है";
}

return "Please अपना mobile number भेजें 📞";
}
</script>

</body>
</html>

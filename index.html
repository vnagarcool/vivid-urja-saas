<!DOCTYPE html>
<html>
<head>
  <title>VIVID URJA - Solar Lead</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      color: #333;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Solar Inquiry Form ☀️</h2>

<form id="leadForm">
  <input type="text" name="name" placeholder="Name" required>
  <input type="text" name="phone" placeholder="Phone" required>
  <input type="text" name="city" placeholder="City" required>

  <button type="submit">Submit</button>
</form>

<p id="msg"></p>

<script>
document.getElementById("leadForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    name: document.querySelector('[name="name"]').value,
    phone: document.querySelector('[name="phone"]').value,
    city: document.querySelector('[name="city"]').value
  };

  try {
    const res = await fetch("https://vivid-urja-saas.onrender.com/api/leads", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    document.getElementById("msg").innerText = "Lead Saved ✅";

  } catch (err) {
    document.getElementById("msg").innerText = "Error ❌";
  }
});
</script>

</body>
</html>

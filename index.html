<!DOCTYPE html>
<html>
<head>
<title>VIVID URJA Solar</title>
</head>

<body>

<h1>₹0 बिजली बिल ⚡</h1>

<form id="form">
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="city" placeholder="City"><br>
<button>Submit</button>
</form>

<script>
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
phone:phone.value,
city:city.value
})
});

alert("Lead Saved 🚀");
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>VIVID URJA ⚡</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:url("https://images.unsplash.com/photo-1509395176047-4a66953fd231") no-repeat center/cover;
  color:white;
}

.overlay{
  background:rgba(0,0,0,0.7);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.form{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
}

input,button{
  width:100%;
  margin:10px 0;
  padding:10px;
}

button{
  background:green;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="overlay">
<h1>⚡ Solar Rooftop System</h1>
<p>₹0 Electricity Bill</p>

<div class="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<button onclick="send()">Get Free Quote</button>
</div>
</div>

<script>
function send(){
fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
phone:phone.value,
city:city.value
})
})
.then(()=>alert("Lead Saved 🚀"));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIVID URJA Solar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:#0f2027;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(0,0,0,0.5);
  position:sticky;
  top:0;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px;
  background:url('https://images.unsplash.com/photo-1509395176047-4a66953fd231') center/cover;
}

.hero h1{
  font-size:38px;
  background:rgba(0,0,0,0.5);
  display:inline-block;
  padding:10px 20px;
  border-radius:10px;
}

.hero p{
  margin:10px 0;
}

/* FORM */
.form-box{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  margin:-40px auto 20px;
  padding:25px;
  max-width:400px;
  border-radius:15px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#28a745;
  border:none;
  border-radius:10px;
  color:white;
}

/* FEATURES */
.features{
  text-align:center;
  padding:40px 20px;
}

.card{
  display:inline-block;
  width:250px;
  margin:10px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

/* GALLERY */
.gallery img{
  width:90%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  background:#000;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h3>⚡ VIVID URJA</h3>
  <button onclick="toggle()">🌙</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>₹0 बिजली बिल ⚡</h1>
  <p>30 साल FREE बिजली</p>
  <p style="color:yellow">₹95,000 Subsidy</p>
</div>

<!-- FORM -->
<div class="form-box">
  <h3>Free Solar Consultation</h3>

  <form id="form">
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="city" placeholder="City">
    <button>Submit</button>
  </form>
</div>

<!-- FEATURES -->
<div class="features">
  <div class="card">⚡ ₹0 Bill</div>
  <div class="card">💰 Govt Subsidy</div>
  <div class="card">🔧 Warranty</div>
</div>

<!-- SOLAR GALLERY -->
<div class="gallery" style="text-align:center;">
  <h2>Our Installations</h2>
  <img src="https://images.unsplash.com/photo-1581093588401-22f7b6a1a4d7">
  <img src="https://images.unsplash.com/photo-1592833159117-ac790c4c3e79">
</div>

<!-- FOOTER -->
<div class="footer">
📞 Call: 8302095337
</div>

<!-- FLOAT BUTTONS -->
<a href="tel:+918955551902" style="position:fixed;bottom:80px;right:20px;background:#007bff;padding:15px;border-radius:50%;">📞</a>
<a href="https://wa.me/918302095337" style="position:fixed;bottom:20px;right:20px;background:#25D366;padding:15px;border-radius:50%;">📲</a>

<script>
// DARK MODE
function toggle(){
document.body.style.background =
document.body.style.background === "white" ? "#0f2027" : "white";
}

// FORM
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

let data={name:name.value,phone:phone.value,city:city.value};

await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

window.open(https://wa.me/91${data.phone}?text=Hello ${data.name}, solar enquiry);

alert("Lead Saved 🚀");
});
</script>

</body>
</html>

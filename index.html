<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIVID URJA Solar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Segoe UI', sans-serif;
  background:#f5f7fa;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0f2027,#2c5364);
  color:white;
  padding:80px 20px;
  text-align:center;
}

.hero h1{
  font-size:36px;
  margin-bottom:10px;
}

.hero p{
  font-size:18px;
  margin:5px 0;
}

.hero img{
  width:100%;
  max-width:500px;
  margin-top:20px;
  border-radius:12px;
}

/* FORM */
.form-box{
  background:white;
  margin:-50px auto 20px;
  padding:25px;
  max-width:400px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.form-box h3{
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#218838;
}

/* FEATURES */
.features{
  padding:40px 20px;
  text-align:center;
}

.card{
  background:white;
  padding:20px;
  margin:10px;
  border-radius:12px;
  display:inline-block;
  width:250px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* CALCULATOR */
.calc{
  background:white;
  padding:25px;
  margin:20px auto;
  max-width:400px;
  border-radius:12px;
  text-align:center;
}

/* MAP */
.map{
  padding:20px;
}

/* FOOTER */
.footer{
  background:#0f2027;
  color:white;
  text-align:center;
  padding:20px;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>₹0 बिजली बिल ⚡</h1>
  <p>Solar लगवाओ – 30 साल Free बिजली</p>
  <p style="color:yellow;">₹95,000 तक सब्सिडी</p>

  <img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">
</div>

<!-- FORM -->
<div class="form-box">
  <h3>Free Solar Consultation</h3>

  <form id="form">
    <input id="name" placeholder="Your Name" required>
    <input id="phone" placeholder="Phone Number" required>
    <input id="city" placeholder="City" required>
    <button>Get Free Quote 🚀</button>
  </form>
</div>

<!-- FEATURES -->
<div class="features">
  <h2>Why Choose Us?</h2>

  <div class="card">⚡ ₹0 Bill</div>
  <div class="card">💰 Govt Subsidy</div>
  <div class="card">🔧 10 Year Warranty</div>
</div>

<!-- CALCULATOR -->
<div class="calc">
  <h3>Subsidy Calculator 💰</h3>
  <input id="kw" placeholder="Enter KW">
  <button onclick="calc()">Calculate</button>
  <h4 id="result"></h4>
</div>

<!-- MAP -->
<div class="map">
<iframe src="https://www.google.com/maps?q=Kota%20Rajasthan&output=embed"
width="100%" height="250" style="border:0;border-radius:10px;">
</iframe>
</div>

<!-- FOOTER -->
<div class="footer">
📞 Call: 8302095337 | VIVID URJA
</div>

<!-- CALL -->
<a href="tel:+918955551902" style="position:fixed;bottom:80px;right:20px;background:#007bff;color:white;padding:14px;border-radius:50%;">📞</a>

<!-- WA -->
<a href="https://wa.me/918302095337" style="position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:14px;border-radius:50%;">📲</a>

<script>
document.getElementById("form").addEventListener("submit", async(e)=>{
e.preventDefault();

let data={name:name.value,phone:phone.value,city:city.value};

await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

window.open(https://wa.me/91${data.phone}?text=Hello ${data.name}, Solar enquiry);

alert("✅ Lead Saved");
});

function calc(){
let kw=document.getElementById("kw").value;
let subsidy=kw*30000;
let cost=kw*60000;
document.getElementById("result").innerText=Final Cost: ₹${cost-subsidy};
}
</script>

</body>
</html>

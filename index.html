<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIVID URJA Solar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:#0f2027;
  color:white;
  transition:0.3s;
}

/* DARK MODE */
.light{
  background:#f5f7fa;
  color:#222;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  animation:fadeIn 1s ease;
}

.hero h1{
  font-size:38px;
}

.hero img{
  width:100%;
  max-width:500px;
  margin-top:20px;
  border-radius:15px;
  animation:float 3s infinite ease-in-out;
}

/* FORM */
.form-box{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  margin:-40px auto 20px;
  padding:25px;
  max-width:400px;
  border-radius:15px;
  animation:fadeInUp 1s;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#28a745;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* CARDS */
.features{
  text-align:center;
  padding:40px 20px;
}

.card{
  display:inline-block;
  width:250px;
  margin:10px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

/* CALC */
.calc{
  max-width:400px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  background:#000;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes fadeInUp{
  from{opacity:0;transform:translateY(50px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h3>⚡ VIVID URJA</h3>
  <button onclick="toggle()">🌙</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>₹0 बिजली बिल ⚡</h1>
  <p>Solar लगवाओ – 30 साल FREE बिजली</p>
  <p style="color:yellow">₹95,000 Subsidy Available</p>

  <img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">
</div>

<!-- FORM -->
<div class="form-box">
  <h3>Free Consultation</h3>

  <form id="form">
    <input id="name" placeholder="Name" required>
    <input id="phone" placeholder="Phone" required>
    <input id="city" placeholder="City" required>
    <button>Submit</button>
  </form>
</div>

<!-- FEATURES -->
<div class="features">
  <div class="card">⚡ ₹0 Bill</div>
  <div class="card">💰 Subsidy</div>
  <div class="card">🔧 Warranty</div>
</div>

<!-- CALCULATOR -->
<div class="calc">
  <h3>Calculator</h3>
  <input id="kw" placeholder="KW">
  <button onclick="calc()">Calculate</button>
  <h4 id="result"></h4>
</div>

<!-- FOOTER -->
<div class="footer">
📞 Call: 8955551902
</div>

<!-- FLOAT BUTTONS -->
<a href="tel:+918955551902" style="position:fixed;bottom:80px;right:20px;background:#007bff;padding:15px;border-radius:50%;">📞</a>
<a href="https://wa.me/918302095337" style="position:fixed;bottom:20px;right:20px;background:#25D366;padding:15px;border-radius:50%;">📲</a>

<script>
// DARK MODE
function toggle(){
document.body.classList.toggle("light");
}

// FORM
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

let data={name:name.value,phone:phone.value,city:city.value};

await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

// WhatsApp Auto
window.open(https://wa.me/91${data.phone}?text=Hello ${data.name}, solar enquiry);

alert("Lead Saved 🚀");
});

// CALCULATOR
function calc(){
let kw=document.getElementById("kw").value;
let subsidy=kw*30000;
let cost=kw*60000;
document.getElementById("result").innerText=Final: ₹${cost-subsidy};
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>VIVID URJA</title>

<style>
body{background:#0f2027;color:white;font-family:Arial;text-align:center;}
input,button{padding:10px;margin:5px;width:80%;}
</style>
</head>

<body>

<h1>⚡ VIVID URJA</h1>
<p>₹0 बिजली बिल Solar</p>

<h3>Register</h3>
<input id="rEmail" placeholder="Email">
<input id="rPass" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h3>Get Quote</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<button onclick="lead()">Submit</button>

<script>
async function register(){
await fetch("https://vivid-urja-saas.onrender.com/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:rEmail.value,password:rPass.value})
});
alert("Registered");
}

async function login(){
let res=await fetch("https://vivid-urja-saas.onrender.com/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email.value,password:pass.value})
});
let data=await res.json();
localStorage.setItem("token",data.token);
location="dashboard.html";
}

async function lead(){
await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
phone:phone.value,
city:city.value
})
});
alert("Lead Saved");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>VIVID URJA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h1>☀️ VIVID URJA SOLAR</h1>

<div class="card">
<h3>Get Free Solar Quote</h3>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="city" placeholder="City"><br><br>

<button onclick="submitLead()">Submit</button>
</div>

</div>

<script>
function submitLead() {
  const token = localStorage.getItem("token");

  fetch("https://vivid-urja-saas.onrender.com/api/leads", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      city: document.getElementById("city").value
    })
  })
  .then(res=>res.json())
  .then(()=> alert("Lead Submitted ✅"));
}
</script>

</body>
</html>

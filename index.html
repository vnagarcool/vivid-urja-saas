<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVID URJA 3D House</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0a0f1c;
  color:white;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* UI */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

h1{
  font-size:45px;
  background:linear-gradient(90deg,#00c6ff,#00ffcc);
  -webkit-background-clip:text;
  color:transparent;
}

.card{
  margin-top:20px;
  padding:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:15px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:12px;
  width:100%;
  background:linear-gradient(90deg,#00c6ff,#00ffcc);
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>3D Solar House Experience 🏠⚡</h1>

  <div class="card">
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="city" placeholder="City">
    <button onclick="submitLead()">Get Solar Quote 🚀</button>
  </div>
</div>

<script>

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// HOUSE BASE
const house = new THREE.Mesh(
  new THREE.BoxGeometry(2,1.5,2),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);
scene.add(house);

// ROOF
const roof = new THREE.Mesh(
  new THREE.ConeGeometry(1.7,1,4),
  new THREE.MeshStandardMaterial({ color:0x444444 })
);
roof.position.y = 1.2;
roof.rotation.y = Math.PI / 4;
scene.add(roof);

// SOLAR PANEL
const panel = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.05,1),
  new THREE.MeshStandardMaterial({
    color:0x001f3f,
    metalness:0.8,
    roughness:0.2
  })
);
panel.position.set(0,1.3,0);
panel.rotation.x = -0.5;
scene.add(panel);

// CAMERA POSITION
camera.position.z = 6;

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  house.rotation.y += 0.002;
  roof.rotation.y += 0.002;
  panel.rotation.y += 0.002;

  renderer.render(scene, camera);
}
animate();

// MOUSE CONTROL
document.addEventListener("mousemove", e=>{
  house.rotation.y = e.clientX * 0.001;
  roof.rotation.y = e.clientX * 0.001;
  panel.rotation.y = e.clientX * 0.001;
});

// API
const API="https://vivid-urja-saas.onrender.com";

// LEAD
function submitLead(){
fetch(API+"/api/leads",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({
name:name.value,
phone:phone.value,
city:city.value
})
})
.then(res=>res.json())
.then(()=>alert("Lead Submitted 🚀"));
}

</script>

</body>
</html>

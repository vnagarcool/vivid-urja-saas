<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVID URJA CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#0f2027;
color:white;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1509395176047-4a66953fd231') center/cover;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
}

.hero-content{
position:relative;
z-index:1;
}

.hero h1{font-size:36px;}
.hero p{margin:10px 0 20px;}

input{
padding:12px;
margin:8px;
width:250px;
border:none;
border-radius:6px;
}

button{
padding:14px 25px;
background:#00c6ff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* TIMER */
.timer{
margin-top:10px;
color:#ff4d4d;
}

/* TRUST */
.trust{
padding:30px;
text-align:center;
}

/* STICKY BUTTON */
.sticky{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
cursor:pointer;
}

/* POPUP */
.popup{
position:fixed;
bottom:80px;
right:20px;
background:#1c2b36;
padding:15px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">

<h1>⚡ Grow Your Solar Business Fast</h1>
<p>Get Leads + Close Deals Automatically</p>

<input id="name" placeholder="Your Name"><br>
<input id="phone" placeholder="Your Phone"><br>

<button onclick="submitLead()">🚀 Get Free Demo</button>

<div class="timer">
⏳ Offer ends in <span id="time">60</span> sec
</div>

</div>
</div>

<!-- TRUST -->
<div class="trust">
<h2>Trusted by Solar Professionals</h2>
<p>✔ 100+ Leads Generated</p>
<p>✔ 50+ Happy Users</p>
<p>✔ Works in Rajasthan</p>
</div>

<!-- STICKY WHATSAPP -->
<div class="sticky" onclick="wa()">💬</div>

<!-- POPUP -->
<div class="popup" id="popup">
⚡ Need help? Chat with us
</div>

<script>

const API="https://vivid-urja-saas.onrender.com";

// SUBMIT
function submitLead(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

fetch(API+"/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,city:"Landing"})
});

wa();
alert("Demo requested 🚀");
}

// WHATSAPP
function wa(){
window.open("https://wa.me/917878727054?text=Hi I want Solar CRM Demo");
}

// TIMER
let t=60;
setInterval(()=>{
t--;
document.getElementById("time").innerText=t;
if(t<=0) t=60;
},1000);

// POPUP AUTO
setTimeout(()=>{
document.getElementById("popup").style.display="block";
},5000);

</script>

</body>
</html>

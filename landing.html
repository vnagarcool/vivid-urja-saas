<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVID URJA CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Background */
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background: url('https://images.unsplash.com/photo-1509395176047-4a66953fd231') center/cover;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:1;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
opacity:0.9;
margin-bottom:20px;
}

/* FORM */
input{
padding:12px;
margin:8px;
width:250px;
border:none;
border-radius:6px;
}

button{
padding:14px 25px;
background:#00c6ff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
width:250px;
}

/* CTA */
.cta{
background:#00c6ff;
color:black;
padding:40px;
text-align:center;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{
font-size:28px;
}
input{
width:90%;
}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">

<h1>⚡ Grow Your Solar Business</h1>
<p>Get More Leads + Close Deals Automatically</p>

<input id="name" placeholder="Your Name"><br>
<input id="phone" placeholder="Your Phone"><br>

<button onclick="submitLead()">🚀 Get Free Demo</button>

</div>
</div>

<!-- FEATURES -->
<div class="section">

<h2>🔥 What You Get</h2>

<div class="cards">

<div class="card">📊 CRM Dashboard</div>
<div class="card">📲 WhatsApp Automation</div>
<div class="card">📄 Solar Quotation PDF</div>
<div class="card">📈 Lead Tracking</div>

</div>

</div>

<!-- CTA -->
<div class="cta">
<h2>Start Your Solar Growth Today 🚀</h2>
<button onclick="submitLead()">Book Free Demo</button>
</div>

<script>

const API="https://vivid-urja-saas.onrender.com";

function submitLead(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

// Save to CRM
fetch(API+"/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,city:"Landing"})
});

// WhatsApp redirect
window.open(
"https://wa.me/91XXXXXXXXXX?text=Hi I want Solar CRM Demo Name:"+name+" Phone:"+phone
);

alert("Demo request sent 🚀");

}

</script>

</body>
</html>

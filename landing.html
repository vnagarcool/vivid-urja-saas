<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVID URJA CRM</title>

<style>
body{margin:0;font-family:Arial;background:#0f2027;color:white;text-align:center}
.hero{padding:50px;background:url('https://images.unsplash.com/photo-1509395176047-4a66953fd231') center/cover}
input{padding:10px;margin:5px}
button{padding:12px;background:#00c6ff;border:none}
</style>
</head>

<body>

<div class="hero">
<h1>⚡ Solar CRM Automation</h1>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>

<button onclick="send()">Get Demo</button>
</div>

<script>
const API="https://vivid-urja-saas.onrender.com";

function send(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

// SAVE
fetch(API+"/api/leads",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,city:"Landing"})
});

// WHATSAPP
window.open("https://wa.me/918955551902?text=Hi "+name+" I want demo");

// AI auto reply
setTimeout(()=>{
alert("Our team will contact you shortly 🤖");
},1000);

}
</script>

</body>
</html>

<h2>👤 Dealer Panel</h2>

<input id="search" placeholder="Search..." onkeyup="loadData()">

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Status</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
const API = "https://vivid-urja-saas.onrender.com";

function loadData(){
fetch(API+"/api/leads",{
headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(res=>res.json())
.then(data=>{
let search=document.getElementById("search").value.toLowerCase();

let html="";

data.filter(l=>!search || l.phone.includes(search))
.forEach(l=>{
html+=`
<tr>
<td>${l.name || "-"}</td>
<td>${l.phone}</td>
<td>${l.city}</td>
<td>${l.status}</td>
</tr>`;
});

document.getElementById("data").innerHTML=html;
});
}

loadData();
</script>

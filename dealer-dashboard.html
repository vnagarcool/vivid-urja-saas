<!DOCTYPE html>
<html>
<head>
<title>Dealer Dashboard</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364);
  color: white;
  padding: 20px;
}
h2 {
  text-align: center;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
th, td {
  padding: 12px;
  text-align: center;
}
th {
  background: #00c6ff;
}
td {
  background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<h2>👤 Dealer Panel</h2>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch("https://vivid-urja-saas.onrender.com/api/leads", {
  headers: {
    Authorization: "Bearer " + localStorage.getItem("token")
  }
})
.then(res => res.json())
.then(data => {
  const tbody = document.querySelector("tbody");

  data.forEach(l => {
    tbody.innerHTML += `
      <tr>
        <td>${l.name || "-"}</td>
        <td>${l.phone}</td>
        <td>${l.city}</td>
        <td>${l.status}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>

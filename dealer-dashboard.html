<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h2>👤 Dealer Panel</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Status</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

<script>
fetch("https://vivid-urja-saas.onrender.com/api/leads", {
  headers:{
    Authorization:"Bearer "+localStorage.getItem("token")
  }
})
.then(res=>res.json())
.then(data=>{
  data.forEach(l=>{
    document.getElementById("data").innerHTML += `
      <tr>
        <td>${l.name || "-"}</td>
        <td>${l.phone}</td>
        <td>${l.city}</td>
        <td>${l.status}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>

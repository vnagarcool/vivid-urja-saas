<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h2>🚀 Admin Dashboard</h2>

<div id="count"></div>

<table border="1" width="100%">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

<script>
fetch("https://vivid-urja-saas.onrender.com/api/leads", {
  headers:{
    Authorization:"Bearer "+localStorage.getItem("token")
  }
})
.then(res=>res.json())
.then(data=>{
  document.getElementById("count").innerText = "Total Leads: "+data.length;

  data.forEach(l=>{
    document.getElementById("data").innerHTML += `
      <tr>
        <td>${l.name || "-"}</td>
        <td>${l.phone}</td>
        <td>${l.city}</td>
        <td><button onclick="del('${l._id}')">❌</button></td>
      </tr>
    `;
  });
});

function del(id){
  fetch("https://vivid-urja-saas.onrender.com/api/leads/"+id,{
    method:"DELETE",
    headers:{
      Authorization:"Bearer "+localStorage.getItem("token")
    }
  }).then(()=> location.reload());
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>

<h2>Analytics</h2>

<div>Total: <span id="t"></span></div>
<div>Hot: <span id="h"></span></div>

<script>
const API="https://vivid-urja-saas.onrender.com";

fetch(API+"/api/leads",{
headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(res=>res.json())
.then(d=>{
t.innerText=d.length;
h.innerText=d.filter(l=>l.status==="Hot").length;
});
</script>

</body>
</html>

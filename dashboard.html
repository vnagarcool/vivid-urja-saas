<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>🚀 Admin Dashboard</h2>
  <button class="btn" onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="card">
    <h3>Total Leads: <span id="total">0</span></h3>
  </div>

  <div class="glass">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>City</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<script>
async function load() {
  const res = await fetch("https://vivid-urja-saas.onrender.com/api/leads");
  const leads = await res.json();

  document.getElementById("total").innerText = leads.length;

  let html = "";
  leads.forEach(l => {
    html += `
      <tr>
        <td>${l.name}</td>
        <td>${l.phone}</td>
        <td>${l.city}</td>
        <td>${l.status}</td>
        <td><button onclick="del('${l._id}')">❌</button></td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
}

async function del(id) {
  await fetch("https://vivid-urja-saas.onrender.com/api/leads/" + id, {
    method:"DELETE"
  });
  load();
}

function logout() {
  localStorage.removeItem("token");
  window.location = "login.html";
}

load();
</script>

</body>
</html>

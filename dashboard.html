<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#2c5364);
  color: white;
  padding: 20px;
}
input, select {
  padding: 8px;
  margin: 5px;
}
button {
  padding: 6px 10px;
  cursor: pointer;
}
table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}
th, td {
  padding: 10px;
  text-align: center;
}
th { background: #00c6ff; }
td { background: rgba(255,255,255,0.1); }
</style>
</head>

<body>

<h2>🚀 Admin CRM Dashboard</h2>

<input id="search" placeholder="Search by phone..." onkeyup="loadData()">

<select id="filter" onchange="loadData()">
  <option value="">All</option>
  <option>New</option>
  <option>Hot</option>
  <option>Cold</option>
  <option>Closed</option>
</select>

<h3 id="count"></h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
const API = "https://vivid-urja-saas.onrender.com";

function loadData() {
  fetch(API + "/api/leads", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  })
  .then(res => res.json())
  .then(data => {

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    let filtered = data.filter(l => {
      return (
        (!search || l.phone.includes(search)) &&
        (!filter || l.status === filter)
      );
    });

    document.getElementById("count").innerText =
      "Total Leads: " + filtered.length;

    let html = "";

    filtered.forEach(l => {
      html += `
      <tr>
        <td>${l.name || "-"}</td>
        <td>${l.phone}</td>
        <td>${l.city}</td>

        <td>
          <select onchange="updateStatus('${l._id}', this.value)">
            <option ${l.status=="New"?"selected":""}>New</option>
            <option ${l.status=="Hot"?"selected":""}>Hot</option>
            <option ${l.status=="Cold"?"selected":""}>Cold</option>
            <option ${l.status=="Closed"?"selected":""}>Closed</option>
          </select>
        </td>

        <td>
          <button onclick="whatsapp('${l.phone}')">📲</button>
          <button onclick="del('${l._id}')">❌</button>
        </td>
      </tr>
      `;
    });

    document.getElementById("data").innerHTML = html;
  });
}

function updateStatus(id, status) {
  fetch(API + "/api/leads/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ status })
  }).then(() => loadData());
}

function del(id) {
  fetch(API + "/api/leads/" + id, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  }).then(() => loadData());
}

function whatsapp(phone) {
  window.open("https://wa.me/" + phone);
}

loadData();
</script>

</body>
</html>

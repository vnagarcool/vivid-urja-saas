<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VIVID URJA Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      background: #020617;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #020617;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
    }

    th {
      background: #1e293b;
    }

    tr:hover {
      background: #1e293b;
    }

    .btn {
      padding: 6px 10px;
      background: red;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .loading {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  ⚡ VIVID URJA ADMIN DASHBOARD
</header>

<div class="container">

  <h2>📊 All Leads</h2>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>City</th>
        <th>Date</th>
      </tr>
    </thead>

    <tbody id="leadsTable">
      <tr><td colspan="4" class="loading">Loading...</td></tr>
    </tbody>
  </table>

</div>

<script>

async function loadLeads() {
  try {
    const res = await fetch("https://vivid-urja-saas.onrender.com/api/leads");
    const data = await res.json();

    const table = document.getElementById("leadsTable");
    table.innerHTML = "";

    if (data.length === 0) {
      table.innerHTML = "<tr><td colspan='4'>No Leads Found</td></tr>";
      return;
    }

    data.forEach(lead => {
      const row = `
        <tr>
          <td>${lead.name}</td>
          <td>${lead.phone}</td>
          <td>${lead.city}</td>
          <td>${new Date(lead.createdAt).toLocaleString()}</td>
        </tr>
      `;
      table.innerHTML += row;
    });

  } catch (err) {
    document.getElementById("leadsTable").innerHTML =
      "<tr><td colspan='4'>Error loading data</td></tr>";
  }
}

// Load on page open
loadLeads();

</script>

</body>
</html>

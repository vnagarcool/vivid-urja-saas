<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2>Dashboard</h2>

<canvas id="chart"></canvas>
<table border="1"><tbody id="data"></tbody></table>

<script>
fetch("https://vivid-urja-saas.onrender.com/api/leads")
.then(r=>r.json())
.then(d=>{
let html="",dates={};

d.forEach(l=>{
html+=<tr><td>${l.name}</td><td>${l.phone}</td></tr>;
let day=new Date(l.createdAt).toLocaleDateString();
dates[day]=(dates[day]||0)+1;
});

data.innerHTML=html;

new Chart(chart,{
type:"line",
data:{labels:Object.keys(dates),datasets:[{data:Object.values(dates)}]}
});
});
</script>

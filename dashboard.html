<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{background:#0f2027;color:white;font-family:Arial;}
.card{background:#1c2b36;padding:15px;margin:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>🚀 Dashboard</h2>

<input id="search" placeholder="Search..." onkeyup="filterData()">

<div class="card">Total Leads: <span id="total"></span></div>

<canvas id="chart"></canvas>

<table border="1">
<tbody id="data"></tbody>
</table>

<script>

const socket = io("https://vivid-urja-saas.onrender.com");

socket.on("new-lead", ()=>{
load();
});

let all=[];

async function load(){

let res=await fetch("https://vivid-urja-saas.onrender.com/api/leads",{
headers:{Authorization:localStorage.getItem("token")}
});

all = await res.json();
render(all);
}

function render(data){

document.getElementById("total").innerText=data.length;

let html="";
let dates={};

data.forEach(l=>{
html+=`<tr>
<td>${l.name}</td>
<td>${l.phone}</td>
</tr>`;

let d=new Date(l.createdAt).toLocaleDateString();
dates[d]=(dates[d]||0)+1;
});

document.getElementById("data").innerHTML=html;

new Chart(chart,{
type:"line",
data:{labels:Object.keys(dates),datasets:[{data:Object.values(dates)}]}
});
}

function filterData(){
let val=search.value.toLowerCase();
render(all.filter(l=>l.name.toLowerCase().includes(val)));
}

load();
setInterval(load,5000);

</script>

</body>
</html>

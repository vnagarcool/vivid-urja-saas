<!DOCTYPE html>
<html>
<body>

<script>
if(!localStorage.getItem("token")) location="login.html";
</script>

<h2>CRM</h2>

<table border="1">
<tbody id="data"></tbody>
</table>

<script>
fetch("https://vivid-urja-saas.onrender.com/api/leads",{
headers:{Authorization:"secure123"}
})
.then(res=>res.json())
.then(d=>{
let html="";
d.forEach(l=>{
html+=<tr><td>${l.name}</td><td>${l.phone}</td></tr>;
});
document.getElementById("data").innerHTML=html;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>

<h2>Dashboard</h2>

<div>Total Leads: <span id="total"></span></div>
<div>Hot Leads: <span id="hot"></span></div>

<script>
const API="https://vivid-urja-saas.onrender.com";

fetch(API+"/api/leads",{
headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(res=>res.json())
.then(data=>{
document.getElementById("total").innerText=data.length;
document.getElementById("hot").innerText=
data.filter(l=>l.status==="Hot").length;
});
</script>

</body>
</html>

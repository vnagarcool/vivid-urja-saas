<!DOCTYPE html>
<html>
<body>

<h2>Dashboard</h2>

<div>Total: <span id="t"></span></div>

<script>
const API="https://vivid-urja-saas.onrender.com";

function load(){
fetch(API+"/api/leads",{
headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(r=>r.json())
.then(d=>{
t.innerText=d.length;
});
}

setInterval(load,5000);
load();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>

<h2>Leads</h2>

<table border="1">
<tbody id="data"></tbody>
</table>

<script>
const API="https://vivid-urja-saas.onrender.com";

function load(){
fetch(API+"/api/leads",{
headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(r=>r.json())
.then(data=>{
let html="";
data.forEach(l=>{
html+=`
<tr>
<td>${l.name}</td>
<td>${l.phone}</td>
<td>${l.status}</td>

<td>
<button onclick="wa('${l.phone}')">WA</button>
<button onclick="pdf('${l._id}')">PDF</button>
</td>
</tr>`;
});
document.getElementById("data").innerHTML=html;
});
}

function wa(p){
window.open("https://wa.me/"+p);
}

function pdf(id){
window.open(API+"/api/quote/"+id);
}

load();
</script>

</body>
</html>

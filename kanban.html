<!DOCTYPE html>
<html>
<body>

<h2>Pipeline</h2>

<div id="New"></div>
<div id="Hot"></div>

<script>
const API="https://vivid-urja-saas.onrender.com";

fetch(API+"/api/leads",{
headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(r=>r.json())
.then(data=>{
data.forEach(l=>{
let div=document.createElement("div");
div.innerText=l.name+" "+l.phone;
document.getElementById(l.status).appendChild(div);
});
});
</script>

</body>
</html>
